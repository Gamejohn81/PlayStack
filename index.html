<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0b">
  <title>PlayStack</title>
  <style>
    :root {
      --bg: #0a0a0b;
      --surface: #141416;
      --surface-2: #1c1c1f;
      --border: #2a2a2e;
      --text: #f4f4f5;
      --text-dim: #a1a1aa;
      --accent: #3b82f6;
      --accent-2: #2563eb;
      --success: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; height: 100%; }
    body { padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
    .app { max-width: 640px; margin: 0 auto; min-height: 100%; display: flex; flex-direction: column; }
    header { padding: 16px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
    .header-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    h1 { font-size: 20px; margin: 0; font-weight: 700; letter-spacing: -0.5px; }
    .pill { font-size: 11px; padding: 4px 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; color: var(--text-dim); }
    .tabs { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { flex: none; padding: 8px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; font-size: 14px; color: var(--text-dim); cursor: pointer; user-select: none; }
    .tab.active { background: var(--accent); border-color: var(--accent-2); color: white; font-weight: 600; }
    main { flex: 1; padding: 16px; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    button, .btn { appearance: none; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); padding: 10px 14px; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; }
    button:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); border-color: var(--accent-2); color: white; }
    .btn-ghost { background: transparent; }
    .btn-danger { background: var(--danger); border-color: #dc2626; color: white; }
    input, select, textarea { width: 100%; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 16px; }
    input::placeholder { color: var(--text-dim); }
    .grid { display: grid; gap: 12px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .game-title { font-size: 16px; font-weight: 700; margin: 0 0 6px; }
    .game-meta { font-size: 13px; color: var(--text-dim); display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; background: var(--surface-2); border: 1px solid var(--border); }
    .badge.playing { background: rgba(59,130,246,0.2); border-color: var(--accent); color: #93c5fd; }
    .badge.backlog { background: rgba(245,158,11,0.2); border-color: var(--warn); color: #fcd34d; }
    .badge.done { background: rgba(34,197,94,0.2); border-color: var(--success); color: #86efac; }
    .badge.dropped { background: rgba(239,68,68,0.2); border-color: var(--danger); color: #fca5a5; }
    .card-actions { display: flex; gap: 8px; margin-top: 12px; }
    .card-actions button { flex: 1; padding: 8px; font-size: 13px; }
    .empty { text-align: center; padding: 48px 16px; color: var(--text-dim); }
    .empty h3 { margin: 0 0 8px; font-size: 18px; color: var(--text); }
    dialog { border: none; border-radius: 16px; padding: 0; background: var(--surface); color: var(--text); width: min(560px, 90vw); }
    dialog::backdrop { background: rgba(0,0,0,0.6); }
    .modal-head { padding: 16px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 18px; }
    .modal-body { padding: 16px; max-height: 70vh; overflow-y: auto; }
    .modal-foot { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-dim); }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    .stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
    .stat-num { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .stat-label { font-size: 12px; color: var(--text-dim); }
    footer { padding: 16px; text-align: center; font-size: 12px; color: var(--text-dim); border-top: 1px solid var(--border); }
    .footer-links { display: flex; gap: 16px; justify-content: center; margin-bottom: 8px; }
    .footer-links button { background: none; border: none; color: var(--accent); font-size: 12px; padding: 0; font-weight: 600; }
    .screenshot-mode .blur { filter: blur(8px); user-select: none; }
    .toggle { display: flex; align-items: center; gap: 10px; }
    .toggle input { width: 44px; height: 24px; appearance: none; background: var(--surface-2); border-radius: 999px; position: relative; cursor: pointer; border: 1px solid var(--border); }
    .toggle input:checked { background: var(--accent); border-color: var(--accent-2); }
    .toggle input::after { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.2s; }
    .toggle input:checked::after { left: 22px; }
    .search { position: relative; margin-bottom: 16px; }
    .search input { padding-left: 40px; }
    .search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: var(--text-dim); }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header>
      <div class="header-row">
        <h1>PlayStack</h1>
        <div class="toggle">
          <span class="pill">Screenshot Mode</span>
          <input type="checkbox" id="screenshotToggle">
        </div>
      </div>
      <div class="tabs" id="tabs">
        <div class="tab active" data-filter="all">All</div>
        <div class="tab" data-filter="playing">Playing</div>
        <div class="tab" data-filter="backlog">Backlog</div>
        <div class="tab" data-filter="done">Completed</div>
        <div class="tab" data-filter="dropped">Dropped</div>
      </div>
    </header>
    <main>
      <div class="stats" id="stats"></div>
      <div class="toolbar">
        <button class="btn-primary" id="addBtn">+ Add Game</button>
        <button id="exportBtn">Export</button>
        <button id="importBtn">Import</button>
      </div>
      <div class="search">
